<html lang="en">
<head>
<meta charset="UTF-8">

<title>Gunimix Pro — Network Diagram</title>
<style>

  * { box-sizing:border-box; margin:0; padding:0; }

  .header { text-align:center; margin-bottom:28px; }
  .header h1 { font-size:2rem; font-weight:900; letter-spacing:0.05em; text-transform:uppercase; color:var(--text); }
  .header h1 span { color:var(--critical); }
  .header p { color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:0.85rem; margin-top:4px; }
  .tabs { display:flex; gap:8px; margin-bottom:0; }
  .tab-btn { padding:8px 24px; border-radius:6px 6px 0 0; border:2px solid var(--border); background:var(--surface); color:var(--muted); font-family:'Barlow',sans-serif; font-weight:700; font-size:0.85rem; cursor:pointer; letter-spacing:0.05em; text-transform:uppercase; transition:all 0.15s; border-bottom:none; }
  .tab-btn.active { background:var(--bg); color:var(--text); border-color:var(--critical); }
  .tab-btn:hover:not(.active) { color:var(--text); border-color:var(--normal); }
  .legend { display:flex; gap:24px; justify-content:center; margin:16px 0 20px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:8px; font-size:0.8rem; color:var(--muted); font-family:'Share Tech Mono',monospace; }
  .legend-box { width:16px; height:16px; border-radius:3px; border:2px solid; }
  .legend-box.critical { border-color:var(--critical); background:rgba(249,115,22,0.15); }
  .legend-box.normal { border-color:var(--normal); background:rgba(59,130,246,0.1); }
  .node-label { display:flex; gap:4px; font-family:'Share Tech Mono',monospace; font-size:0.62rem; color:var(--muted); margin-bottom:4px; justify-content:space-between; }
  .node-label span { background:rgba(255,255,255,0.06); padding:1px 5px; border-radius:2px; min-width:22px; text-align:center; }
  .node { border-radius:6px; border:2px solid; padding:8px 10px; position:absolute; transition:box-shadow 0.2s; }
  .node:hover { z-index:10; }
  .node.critical { border-color:var(--critical); background:linear-gradient(135deg,#1a0f06 0%,#1c1108 100%); box-shadow:0 0 12px var(--critical-glow); }
  .node.critical:hover { box-shadow:0 0 24px var(--critical-glow); }
  .node.normal { border-color:var(--normal); background:linear-gradient(135deg,#060d1a 0%,#08101f 100%); box-shadow:0 0 8px var(--normal-glow); }
  .node.normal:hover { box-shadow:0 0 20px var(--normal-glow); }
  .node.start-end { border-color:var(--finish); background:linear-gradient(135deg,#061a0c 0%,#081f10 100%); box-shadow:0 0 10px var(--finish-glow); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:1rem; letter-spacing:0.1em; color:var(--finish); text-transform:uppercase; }
  .node-id { font-weight:900; font-size:1.1rem; color:var(--critical); line-height:1; margin-bottom:4px; }
  .node.normal .node-id { color:var(--normal); }
  .node-name { font-size:0.68rem; font-weight:600; color:var(--text); line-height:1.3; margin-bottom:5px; }
  .node-dur { font-family:'Share Tech Mono',monospace; font-size:0.65rem; color:var(--muted); text-align:right; }
  .node-dur span { background:rgba(255,255,255,0.08); padding:1px 4px; border-radius:2px; }
  .slack-badge { position:absolute; top:-10px; right:-10px; background:#1e293b; border:1px solid var(--border); border-radius:10px; font-family:'Share Tech Mono',monospace; font-size:0.6rem; color:var(--muted); padding:1px 6px; white-space:nowrap; }
  .slack-badge.zero { color:var(--critical); border-color:var(--critical); }
  .cp-bar { background:linear-gradient(90deg,rgba(249,115,22,0.15) 0%,transparent 100%); border-left:3px solid var(--critical); padding:10px 16px; margin-bottom:16px; border-radius:0 6px 6px 0; font-family:'Share Tech Mono',monospace; font-size:0.75rem; color:var(--critical); line-height:1.6; word-break:break-all; }
  .cp-bar strong { color:var(--text); }
  .zoom-row { display:flex; align-items:center; gap:14px; margin-bottom:12px; font-family:'Share Tech Mono',monospace; font-size:0.8rem; color:var(--muted); }
  .zoom-row input[type=range] { flex:1; max-width:320px; accent-color:var(--critical); cursor:pointer; }
  .zoom-row .zlbl { min-width:54px; color:var(--text); }
  .scroll-wrap { overflow-x:auto; overflow-y:visible; padding-bottom:16px; border:1px solid var(--border); border-radius:0 8px 8px 8px; background:var(--surface); }
  .canvas { position:relative; padding:20px 30px 0 30px; }
  .swim-lane { position:absolute; border-radius:3px; pointer-events:none; }
  .lane-lbl { position:absolute; font-family:'Share Tech Mono',monospace; font-size:0.56rem; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; opacity:0.32; pointer-events:none; }
  .table-section { margin-top:40px; }

  table { width:100%; border-collapse:collapse; font-size:0.8rem; }
  th { background:var(--surface); color:var(--muted); font-family:'Share Tech Mono',monospace; font-weight:400; text-align:center; padding:8px 10px; border-bottom:2px solid var(--border); font-size:0.72rem; letter-spacing:0.05em; text-transform:uppercase; }
  th:first-child,th:nth-child(2) { text-align:left; }
  td { padding:7px 10px; border-bottom:1px solid rgba(48,54,61,0.5); text-align:center; font-family:'Share Tech Mono',monospace; font-size:0.75rem; color:var(--muted); }
  td:first-child { font-weight:900; font-size:0.9rem; }
  td:nth-child(2) { text-align:left; color:var(--text); font-family:'Barlow',sans-serif; font-size:0.78rem; }
  tr.critical-row td { background:rgba(249,115,22,0.05); }
  tr.critical-row td:first-child { color:var(--critical); }
  tr.normal-row td:first-child { color:var(--normal); }
  tr:hover td { background:rgba(255,255,255,0.03); }
  .zero-slack { color:var(--critical)!important; font-weight:700; }
  .phase-hdr td { background:rgba(255,255,255,0.05); color:var(--muted); font-family:'Share Tech Mono',monospace; font-size:0.65rem; letter-spacing:0.08em; text-transform:uppercase; font-weight:700; text-align:left; padding:5px 10px; }

  H1:{x:1950,y:DY.c}, H2:{x:1950,y:DY.s},
  H3:{x:2130,y:DY.m},
  H7:{x:2130,y:DY.v},
  // I
  I1:{x:1590,y:DY.d},
  I5:{x:2130,y:DY.c-50}, I6:{x:2130,y:DY.c+60},
  I7:{x:2310,y:DY.c},
  I8:{x:2130,y:DY.s-30}, I9:{x:2130,y:DY.s+80},
  I10:{x:2310,y:DY.s},
  I11:{x:2310,y:DY.m}, I14:{x:2310,y:DY.v},
  // J
  J1:{x:1950,y:DY.d}, J2:{x:2130,y:DY.d}, J3:{x:2310,y:DY.d},
  J5:{x:2490,y:430},
  FINISH:{x:2670,y:430},
};
const DETAIL_BASE_W = 2850;

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let currentView = 'summary';
let currentW = 1800;

const slider    = document.getElementById('zoom-slider');
const zoomLabel = document.getElementById('zoom-label');
const canvasEl  = document.getElementById('canvas');

function switchTab(v) {
  currentView = v;
  document.getElementById('tab-s').classList.toggle('active', v==='summary');
  document.getElementById('tab-d').classList.toggle('active', v==='detailed');
  if (v==='summary') { slider.min='800'; slider.max='3200'; slider.value='1800'; }
  else               { slider.min='1200'; slider.max='7000'; slider.value='4000'; }
  currentW = parseInt(slider.value);
  build();
}
slider.addEventListener('input', () => { currentW=parseInt(slider.value); build(); });

// ═══════════════════════════════════════════════════
// BUILD
// ═══════════════════════════════════════════════════
function build() {
  zoomLabel.textContent = currentW + ' px';
  const isSummary = currentView==='summary';
  const acts    = isSummary ? summaryActs : detailedActs;
  const posBase = isSummary ? summaryBase : detailedBase;
  const refW    = isSummary ? SUMMARY_BASE_W : DETAIL_BASE_W;
  const projEnd = isSummary ? 24 : 27;

  if (isSummary) {
    document.getElementById('subtitle').textContent = 'EGR 485/486 · Team 11 · Project Duration: 24 Weeks';
    document.getElementById('cp-bar').innerHTML = 'Critical Path: <strong>A → B → F → H → J → L → M → N</strong> &nbsp;|&nbsp; 24 weeks total';
    document.getElementById('tbl-title').textContent = 'Activity Table';
  } else {
    const cp = detailedActs.filter(a=>a.critical).map(a=>a.id).join(' → ');
    document.getElementById('subtitle').textContent = 'EGR 485/486 · Team 11 · Detailed View — 48 Activities · Ends Aug 16';
    document.getElementById('cp-bar').innerHTML = 'Critical Path: <strong>'+cp+'</strong> &nbsp;|&nbsp; 27 weeks · Aug 16 deadline';
    document.getElementById('tbl-title').textContent = 'Detailed Activity Table';
  }

  function sx(v) { return (v/refW)*currentW; }

  const NODE_W = isSummary ? Math.max(sx(148*(SUMMARY_BASE_W/2048)),100) : Math.max(sx(148),80);
  const NODE_H = 92;
  const SE_W   = Math.max(NODE_W*0.55, 70);
  const fsMono = Math.max(0.55, NODE_W/290);
  const fsId   = Math.max(0.85, NODE_W/160);

  const allPos = Object.values(posBase);
  const cW2    = sx(Math.max(...allPos.map(p=>p.x))+220)+60;
  const cH     = sx(Math.max(...allPos.map(p=>p.y))+NODE_H+60)+20;
  canvasEl.style.width = cW2+'px';

  const nc   = document.getElementById('node-container');
  const svgE = document.getElementById('arrows');
  const tlB  = document.getElementById('timeline-bar');
  nc.innerHTML=''; svgE.innerHTML=''; tlB.innerHTML='';
  nc.style.height=cH+'px'; nc.style.position='relative';
  svgE.setAttribute('width',cW2); svgE.setAttribute('height',cH);
  svgE.setAttribute('viewBox','0 0 '+cW2+' '+cH);
  svgE.style.width=cW2+'px'; svgE.style.height=cH+'px';

  // Swim lanes (detailed only)
  if (!isSummary) {
    [{label:'Trailer',   y:DY.t,col:'59,130,246'},
     {label:'Concrete',  y:DY.c,col:'249,115,22'},
     {label:'Sand',      y:DY.s,col:'34,197,94'},
     {label:'Main Auger',y:DY.m,col:'168,85,247'},
     {label:'Vibrations',y:DY.v,col:'236,72,153'},
     {label:'Docs',      y:DY.d,col:'148,163,184'}].forEach(l=>{
      const div=document.createElement('div');
      div.className='swim-lane';
      div.style.cssText='left:0;top:'+sx(l.y-18)+'px;width:'+cW2+'px;height:'+sx(130)+'px;background:rgba('+l.col+',0.032);border-left:2px solid rgba('+l.col+',0.1);';
      nc.appendChild(div);
      const lbl=document.createElement('div');
      lbl.className='lane-lbl';
      lbl.style.cssText='left:5px;top:'+sx(l.y-14)+'px;color:rgba('+l.col+',0.65);';
      lbl.textContent=l.label; nc.appendChild(lbl);
    });
  }

  // Arrow defs
  const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
  ['crit','norm'].forEach(type=>{
    const color=type==='crit'?'#f97316':'#374151';
    const m=document.createElementNS('http://www.w3.org/2000/svg','marker');
    m.setAttribute('id','arrow-'+type); m.setAttribute('markerWidth','8');
    m.setAttribute('markerHeight','8'); m.setAttribute('refX','6');
    m.setAttribute('refY','3'); m.setAttribute('orient','auto');
    const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    poly.setAttribute('points','0 0, 8 3, 0 6'); poly.setAttribute('fill',color);
    m.appendChild(poly); defs.appendChild(m);
  });
  svgE.appendChild(defs);

  function p(id)  { const b=posBase[id]; return {x:sx(b.x),y:sx(b.y)}; }
  function rc(id) { const pp=p(id); const w=(id==='START'||id==='FINISH')?SE_W:NODE_W; return {x:pp.x+w,y:pp.y+NODE_H/2}; }
  function lc(id) { const pp=p(id); return {x:pp.x,y:pp.y+NODE_H/2}; }

  // START / FINISH
  ['START','FINISH'].forEach(id=>{
    const pp=p(id),el=document.createElement('div');
    el.className='node start-end';
    el.style.cssText='left:'+pp.x+'px;top:'+pp.y+'px;width:'+SE_W+'px;height:'+NODE_H+'px;font-size:'+Math.max(0.7,NODE_W/220)+'rem;';
    el.textContent=id; nc.appendChild(el);
  });

  // Activity nodes
  acts.forEach(act=>{
    const pp=p(act.id),el=document.createElement('div');
    el.className='node '+(act.critical?'critical':'normal');
    el.style.cssText='left:'+pp.x+'px;top:'+pp.y+'px;width:'+NODE_W+'px;height:'+NODE_H+'px;';
    el.innerHTML=
      '<div class="node-label"><span>'+act.ES+'</span><span>'+act.EF+'</span></div>'+
      '<div class="node-id" style="font-size:'+fsId+'rem">'+act.id+'</div>'+
      '<div class="node-name" style="font-size:'+fsMono+'rem">'+act.name+'</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px;">'+
        '<div class="node-label" style="margin:0;gap:2px;"><span>'+act.LS+'</span><span>'+act.LF+'</span></div>'+
        '<div class="node-dur"><span>t='+act.dur+'</span></div>'+
      '</div>'+
      '<div class="slack-badge '+(act.slack===0?'zero':'')+'">slack='+act.slack+'</div>';
    nc.appendChild(el);
  });

  // Arrows
  function drawArrow(fromId, toId, crit) {
    const from=rc(fromId), to=lc(toId);
    const color=crit?'#f97316':'#374151';
    const dx=to.x-from.x;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M '+from.x+' '+from.y+' C '+(from.x+dx*0.5)+' '+from.y+', '+(to.x-dx*0.5)+' '+to.y+', '+to.x+' '+to.y);
    path.setAttribute('stroke',color); path.setAttribute('stroke-width',crit?'2.5':'1.5');
    path.setAttribute('fill','none');
    path.setAttribute('marker-end','url(#arrow-'+(crit?'crit':'norm')+')');
    if (!crit) path.setAttribute('stroke-dasharray','5,3');
    svgE.appendChild(path);
  }

  if (isSummary) {
    drawArrow('START','A',true);
    drawArrow('A','B',true);
    drawArrow('A','C',false);
    drawArrow('B','D',false);
    drawArrow('B','E',false);
    drawArrow('B','F',true);
    drawArrow('D','G',false);
    drawArrow('E','G',false);
    drawArrow('F','H',true);
    drawArrow('G','I',false);
    drawArrow('H','J',true);
    drawArrow('I','L',false);
    drawArrow('J','L',true);
    drawArrow('L','M',true);
    drawArrow('C','M',false);
    drawArrow('M','N',true);
    drawArrow('N','FINISH',true);
  } else {
    drawArrow('START','A1',true);
    detailedActs.forEach(act=>{
      act.pred.forEach(pid=>{
        const pa=detailedActs.find(a=>a.id===pid);
        drawArrow(pid, act.id, act.critical && pa && pa.critical);
      });
    });
    drawArrow('J5','FINISH',true);
  }

  // ── TIMELINE ───────────────────────────────────────────────
  const winterStart = new Date(2026,0,5);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep'];

  function pwToDate(pw) {
    if (isSummary) {
      if (pw<=8)       { const d=new Date(winterStart); d.setDate(d.getDate()+pw*7); return d; }
      else if (pw<=14) { const d=new Date(winterStart); d.setDate(d.getDate()+(pw+1)*7); return d; }
      else             { const d=new Date(2026,5,8); d.setDate(d.getDate()+(pw-15)*7); return d; }
    } else {
      // Detailed: PW27 ≈ Aug 16 (anchor summer at May 25 → PW27 = Aug 16)
      if (pw<=8)       { const d=new Date(winterStart); d.setDate(d.getDate()+pw*7); return d; }
      else if (pw<=14) { const d=new Date(winterStart); d.setDate(d.getDate()+(pw+1)*7); return d; }
      else             { const d=new Date(2026,4,25); d.setDate(d.getDate()+(pw-15)*7); return d; }
    }
  }

  const TLW=cW2-60, TH=36, LH=22, BH=26, tlH=LH+TH+BH+14;
  const tlSvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  tlSvg.setAttribute('width',cW2); tlSvg.setAttribute('height',tlH);
  tlSvg.style.display='block'; tlB.appendChild(tlSvg);
  function pwX(pw) { return (pw/projEnd)*TLW+30; }

  // Track bg
  const trk=document.createElementNS('http://www.w3.org/2000/svg','rect');
  trk.setAttribute('x',30); trk.setAttribute('y',LH); trk.setAttribute('width',TLW);
  trk.setAttribute('height',TH); trk.setAttribute('rx',4); trk.setAttribute('fill','#0d1117');
  trk.setAttribute('stroke','#30363d'); trk.setAttribute('stroke-width','1');
  tlSvg.appendChild(trk);

  // Activity bars
  acts.forEach(act=>{
    const x1=pwX(act.ES), x2=pwX(act.EF);
    const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x',x1); r.setAttribute('y',LH+4);
    r.setAttribute('width',Math.max(x2-x1-2,4)); r.setAttribute('height',TH-8);
    r.setAttribute('rx',3);
    r.setAttribute('fill',act.critical?'rgba(249,115,22,0.75)':'rgba(59,130,246,0.45)');
    tlSvg.appendChild(r);
    if (x2-x1>20) {
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',x1+(x2-x1)/2); t.setAttribute('y',LH+TH/2+4);
      t.setAttribute('text-anchor','middle'); t.setAttribute('fill','#e6edf3');
      t.setAttribute('font-size','10'); t.setAttribute('font-family','Share Tech Mono, monospace');
      t.textContent=act.id; tlSvg.appendChild(t);
    }
  });

  // Week ticks + date labels
  for (let pw=0; pw<=projEnd; pw++) {
    const x=pwX(pw), d=pwToDate(pw);
    const tick=document.createElementNS('http://www.w3.org/2000/svg','line');
    tick.setAttribute('x1',x); tick.setAttribute('x2',x);
    tick.setAttribute('y1',LH-2); tick.setAttribute('y2',LH+TH+4);
    tick.setAttribute('stroke','#30363d'); tick.setAttribute('stroke-width',pw%4===0?'1.5':'0.5');
    tlSvg.appendChild(tick);
    if (pw%4===0||pw===projEnd) {
      const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
      lbl.setAttribute('x',x); lbl.setAttribute('y',LH-5);
      lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('fill','#8b949e');
      lbl.setAttribute('font-size','9'); lbl.setAttribute('font-family','Share Tech Mono, monospace');
      lbl.textContent=months[d.getMonth()]+' '+d.getDate(); tlSvg.appendChild(lbl);
    }
  }

  const bY=LH+TH+4;
  // Semester bands
  [{label:'EGR 485 — Winter Semester',pw1:0,pw2:14,col:'59,130,246'},
   {label:'EGR 486 — Summer Semester',pw1:15,pw2:projEnd,col:'34,197,94'}].forEach(s=>{
    const x1=pwX(s.pw1), x2=pwX(s.pw2);
    const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
    bg.setAttribute('x',x1+1); bg.setAttribute('y',bY+2);
    bg.setAttribute('width',x2-x1-2); bg.setAttribute('height',BH-4);
    bg.setAttribute('rx',3); bg.setAttribute('fill','rgba('+s.col+',0.08)');
    bg.setAttribute('stroke','rgba('+s.col+',0.3)'); bg.setAttribute('stroke-width','1');
    tlSvg.appendChild(bg);
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',(x1+x2)/2); lbl.setAttribute('y',bY+BH/2+4);
    lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('fill','rgba('+s.col+',0.85)');
    lbl.setAttribute('font-size','9'); lbl.setAttribute('font-family','Barlow, sans-serif');
    lbl.setAttribute('font-weight','600'); lbl.textContent=s.label; tlSvg.appendChild(lbl);
  });

  // Gap markers
  const gaps = isSummary
    ? [{x1:pwX(8)+2,x2:pwX(9)-2,label:'BREAK'},{x1:pwX(14)+2,x2:pwX(15)-2,label:'GAP'}]
    : [{x1:pwX(8)+2,x2:pwX(9)-2,label:'BREAK'},{x1:pwX(14)+2,x2:pwX(15)-2,label:'GAP'}];
  gaps.forEach(g=>{
    const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
    r.setAttribute('x',g.x1); r.setAttribute('y',LH+2);
    r.setAttribute('width',Math.max(g.x2-g.x1,2)); r.setAttribute('height',TH-4);
    r.setAttribute('rx',2); r.setAttribute('fill','rgba(255,255,255,0.04)');
    r.setAttribute('stroke','#30363d'); r.setAttribute('stroke-dasharray','3,2');
    tlSvg.appendChild(r);
    if (g.x2-g.x1>14) {
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',(g.x1+g.x2)/2); t.setAttribute('y',LH+TH/2+4);
      t.setAttribute('text-anchor','middle'); t.setAttribute('fill','#4b5563');
      t.setAttribute('font-size','8'); t.setAttribute('font-family','Share Tech Mono, monospace');
      t.textContent=g.label; tlSvg.appendChild(t);
    }
  });

  // End marker — always Aug 16
  const ex=pwX(projEnd);
  const el2=document.createElementNS('http://www.w3.org/2000/svg','line');
  el2.setAttribute('x1',ex); el2.setAttribute('x2',ex);
  el2.setAttribute('y1',LH-6); el2.setAttribute('y2',LH+TH+4);
  el2.setAttribute('stroke','#22c55e'); el2.setAttribute('stroke-width','2');
  tlSvg.appendChild(el2);
  const et=document.createElementNS('http://www.w3.org/2000/svg','text');
  et.setAttribute('x',ex-3); et.setAttribute('y',LH-9);
  et.setAttribute('text-anchor','end'); et.setAttribute('fill','#22c55e');
  et.setAttribute('font-size','9'); et.setAttribute('font-family','Share Tech Mono, monospace');
  et.textContent='Aug 16 ✓'; tlSvg.appendChild(et);

  // ── TABLE ─────────────────────────────────────────────────
  const tbody=document.getElementById('table-body');
  tbody.innerHTML='';
  const phNames={A:'Phase A — Scope',B:'Phase B — Concept Selection',C:'Phase C — Design & CAD',
    D:'Phase D — Safety Analysis',E:'Phase E — Procurement',F:'Phase F — Fabrication',
    H:'Phase H — Integration',I:'Phase I — Testing',J:'Phase J — Documentation & Sign-off'};
  let lastPh=null;
  acts.forEach(act=>{
    if (!isSummary && act.ph!==lastPh) {
      const hr=document.createElement('tr'); hr.className='phase-hdr';
      hr.innerHTML='<td colspan="9">'+(phNames[act.ph]||'Phase '+act.ph)+'</td>';
      tbody.appendChild(hr); lastPh=act.ph;
    }
    const tr=document.createElement('tr'); tr.className=act.critical?'critical-row':'normal-row';
    tr.innerHTML='<td>'+act.id+'</td><td>'+act.name+'</td>'+
      '<td>'+(act.pred.length?act.pred.join(', '):'—')+'</td>'+
      '<td>'+act.dur+'</td><td>'+act.ES+'</td><td>'+act.EF+'</td>'+
      '<td>'+act.LS+'</td><td>'+act.LF+'</td>'+
      '<td class="'+(act.slack===0?'zero-slack':'')+'">'+act.slack+'</td>';
    tbody.appendChild(tr);
  });
}

build();
</script>
</body>
</html>
